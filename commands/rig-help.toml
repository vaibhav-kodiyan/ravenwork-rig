description = "Quick reference for rig levels, skills, and commands"
prompt = "Show the rig quick reference. One shot, change nothing: do not switch mode, write flag files, or persist anything. Levels: /rig lite (build what's asked, name the lazier alternative in one line), /rig (full, the default ladder: YAGNI then stdlib then native then one line then minimum), /rig ultra (deletion before addition, challenges the requirement before building). Commands: /rig-review (over-engineering review of the current changes), /rig-audit (whole-repo over-engineering audit), /rig-debt (harvest rig: comments into a tracked ledger), /rig-gain (measured-impact scoreboard from the benchmark), /rig-help (this card). Deactivate with 'stop rig', 'normal mode', or /rig off; resume anytime with /rig. Default mode is full; change it with the RIG_DEFAULT_MODE environment variable (off|lite|full|ultra) or a config file at ~/.config/rig/config.json (Windows: %APPDATA%\\rig\\config.json) with {\"defaultMode\": \"lite\"}. Resolution order: env var, then config file, then full."
